<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>凱琪的决策参谋部 🧠</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #0a0a0f;
  --bg-card: #13131a;
  --bg-input: #1a1a24;
  --accent-purple: #8b5cf6;
  --accent-pink: #ec4899;
  --accent-blue: #3b82f6;
  --accent-cyan: #06b6d4;
  --accent-orange: #f97316;
  --accent-green: #10b981;
  --accent-red: #e74c3c;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --border-subtle: rgba(255,255,255,0.06);
  --glow-purple: rgba(139,92,246,0.15);
  --glow-pink: rgba(236,72,153,0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

.bg-gradient {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 0;
  overflow: hidden;
}
.bg-gradient::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  background: radial-gradient(circle, var(--glow-purple), transparent 70%);
  top: -200px; right: -100px;
  animation: float1 20s ease-in-out infinite;
}
.bg-gradient::after {
  content: '';
  position: absolute;
  width: 500px; height: 500px;
  background: radial-gradient(circle, var(--glow-pink), transparent 70%);
  bottom: -150px; left: -100px;
  animation: float2 25s ease-in-out infinite;
}
@keyframes float1 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-80px, 60px); }
}
@keyframes float2 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(60px, -80px); }
}

.container {
  position: relative;
  z-index: 1;
  max-width: 520px;
  margin: 0 auto;
  padding: 24px 16px 100px;
}

.header {
  text-align: center;
  padding: 32px 0 24px;
}
.header-icon {
  font-size: 48px;
  margin-bottom: 12px;
  animation: bounce 2s ease-in-out infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.header h1 {
  font-size: 24px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink), var(--accent-orange));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}
.header p {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 300;
}
.header .subtitle-highlight {
  color: var(--accent-cyan);
  font-weight: 500;
}

.mode-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  background: var(--bg-card);
  border-radius: 16px;
  padding: 6px;
  border: 1px solid var(--border-subtle);
}
.mode-btn {
  flex: 1;
  padding: 12px 8px;
  border: none;
  border-radius: 12px;
  background: transparent;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: inherit;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.mode-btn .mode-emoji {
  font-size: 20px;
  transition: transform 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}
.mode-btn:hover .mode-emoji {
  transform: scale(1.15);
}
.mode-btn.active {
  color: var(--text-primary);
  font-weight: 700;
}
.mode-btn[data-mode="kelly"].active {
  background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(236,72,153,0.15));
  box-shadow: 0 0 20px rgba(139,92,246,0.1);
}
.mode-btn[data-mode="yangtong"].active {
  background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(6,182,212,0.15));
  box-shadow: 0 0 20px rgba(59,130,246,0.1);
}
.mode-btn[data-mode="fusion"].active {
  background: linear-gradient(135deg, rgba(249,115,22,0.2), rgba(16,185,129,0.15));
  box-shadow: 0 0 20px rgba(249,115,22,0.1);
}

/* 枸杞SVG图标 */
.gouqi-icon {
  width: 22px;
  height: 22px;
  display: inline-block;
}
/* 沟通蓝色气泡SVG图标 */
.chat-icon {
  width: 22px;
  height: 22px;
  display: inline-block;
}

.input-section { margin-bottom: 20px; }
.input-wrapper {
  position: relative;
  background: var(--bg-card);
  border-radius: 16px;
  border: 1px solid var(--border-subtle);
  overflow: hidden;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}
.input-wrapper:focus-within {
  border-color: rgba(139,92,246,0.4);
  box-shadow: 0 0 30px rgba(139,92,246,0.08);
}
.input-label {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 16px 0;
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1px;
}
textarea {
  width: 100%;
  min-height: 100px;
  padding: 12px 16px 14px;
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-size: 15px;
  font-family: inherit;
  line-height: 1.6;
  resize: none;
  outline: none;
}
textarea::placeholder {
  color: var(--text-muted);
  font-weight: 300;
}

.quick-questions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}
.quick-btn {
  padding: 8px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: 20px;
  color: var(--text-secondary);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: inherit;
  white-space: nowrap;
}
.quick-btn:hover {
  background: var(--bg-input);
  color: var(--text-primary);
  border-color: rgba(139,92,246,0.3);
  transform: translateY(-1px);
}

.submit-btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
  margin-bottom: 24px;
}
.submit-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%; right: 0; bottom: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  transition: left 0.5s ease;
}
.submit-btn:hover::before { left: 100%; }
.submit-btn.kelly-mode {
  background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
  color: white;
}
.submit-btn.yangtong-mode {
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
  color: white;
}
.submit-btn.fusion-mode {
  background: linear-gradient(135deg, var(--accent-orange), var(--accent-green));
  color: white;
}
.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(139,92,246,0.25);
}
.submit-btn:active { transform: translateY(0); }
.submit-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none !important;
}

.result-area { display: none; }
.result-area.show {
  display: block;
  animation: fadeUp 0.5s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.result-card {
  background: var(--bg-card);
  border-radius: 16px;
  border: 1px solid var(--border-subtle);
  overflow: hidden;
  margin-bottom: 16px;
}
.result-header {
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border-subtle);
}
.result-avatar {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.result-avatar.kelly { background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink)); }
.result-avatar.yangtong { background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan)); }
.result-avatar.fusion { background: linear-gradient(135deg, var(--accent-orange), var(--accent-green)); }
.result-name { font-size: 14px; font-weight: 700; }
.result-tag {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 6px;
  font-weight: 500;
  margin-left: auto;
}
.result-tag.kelly { background: rgba(139,92,246,0.15); color: var(--accent-purple); }
.result-tag.yangtong { background: rgba(59,130,246,0.15); color: var(--accent-blue); }
.result-tag.fusion { background: rgba(249,115,22,0.15); color: var(--accent-orange); }
.result-body { padding: 18px; }
.result-body p {
  font-size: 14px;
  line-height: 1.8;
  color: var(--text-secondary);
  margin-bottom: 12px;
}
.result-body p:last-child { margin-bottom: 0; }
.result-body .highlight {
  color: var(--text-primary);
  font-weight: 500;
}

.result-footer {
  padding: 12px 18px;
  border-top: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.result-footer .timestamp {
  font-size: 11px;
  color: var(--text-muted);
}
.retry-btn {
  padding: 6px 14px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border-subtle);
  border-radius: 8px;
  color: var(--text-secondary);
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s ease;
}
.retry-btn:hover {
  background: rgba(255,255,255,0.1);
  color: var(--text-primary);
}

.loading { display: none; text-align: center; padding: 40px 0; }
.loading.show { display: block; }
.loading-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 12px;
}
.loading-dots span {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent-purple);
  animation: dotPulse 1.4s ease-in-out infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1.2); }
}
.loading-text { font-size: 13px; color: var(--text-muted); }

.footer {
  text-align: center;
  padding: 20px 0;
  font-size: 11px;
  color: var(--text-muted);
  opacity: 0.6;
}
.footer .heart {
  color: var(--accent-pink);
  display: inline-block;
  animation: heartbeat 1.5s ease-in-out infinite;
}
@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

.easter-egg {
  display: none;
  text-align: center;
  padding: 20px;
  margin-bottom: 16px;
  background: var(--bg-card);
  border-radius: 16px;
  border: 1px solid rgba(249,115,22,0.2);
  animation: fadeUp 0.3s ease;
}
.easter-egg.show { display: block; }
.easter-egg .cat-emoji { font-size: 40px; margin-bottom: 8px; }
.easter-egg p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

.history-section { margin-top: 24px; }
.history-title {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 500;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.history-item {
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid var(--border-subtle);
  padding: 14px 16px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.history-item:hover {
  border-color: rgba(139,92,246,0.2);
  background: var(--bg-input);
}
.history-item .h-question {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.history-item .h-meta { font-size: 11px; color: var(--text-muted); }

.error-msg {
  text-align: center;
  padding: 16px;
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.2);
  border-radius: 12px;
  color: #fca5a5;
  font-size: 13px;
  margin-bottom: 16px;
  animation: fadeUp 0.3s ease;
}

@media (max-width: 390px) {
  .mode-btn { padding: 10px 6px; font-size: 12px; }
  .header h1 { font-size: 22px; }
}
</style>
</head>
<body>

<div class="bg-gradient"></div>

<div class="container">
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 160 160" width="100" height="100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bgGlow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.4"/>
            <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.4"/>
          </linearGradient>
          <linearGradient id="horseBody" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#8B5E3C"/>
            <stop offset="100%" style="stop-color:#6B4226"/>
          </linearGradient>
          <linearGradient id="jacketGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#c9a0dc"/>
            <stop offset="100%" style="stop-color:#a678b8"/>
          </linearGradient>
          <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1a1a2e"/>
            <stop offset="100%" style="stop-color:#2d2d44"/>
          </linearGradient>
          <clipPath id="circleClip"><circle cx="80" cy="80" r="72"/></clipPath>
        </defs>
        <!-- 外圈光晕 -->
        <circle cx="80" cy="80" r="76" fill="url(#bgGlow)" opacity="0.6"/>
        <circle cx="80" cy="80" r="72" fill="#1e1e30" stroke="rgba(139,92,246,0.35)" stroke-width="1.5"/>
        <g clip-path="url(#circleClip)">
          <!-- 背景：沙滩/天空渐变 -->
          <rect x="8" y="8" width="144" height="90" fill="#d4e5f7" opacity="0.1"/>
          <rect x="8" y="98" width="144" height="54" fill="#c2a882" opacity="0.08"/>

          <!-- === 马身体 === -->
          <!-- 马躯干 -->
          <ellipse cx="82" cy="108" rx="32" ry="17" fill="url(#horseBody)"/>
          <!-- 马脖子 -->
          <path d="M56 102 Q44 86 42 74 Q44 68 50 71 Q54 82 58 94Z" fill="#8B5E3C"/>
          <!-- 马头 -->
          <ellipse cx="40" cy="68" rx="13" ry="11" fill="#8B5E3C" transform="rotate(-15 40 68)"/>
          <!-- 马脸细节 -->
          <ellipse cx="35" cy="65" rx="7" ry="8" fill="#9B6E4C" transform="rotate(-15 35 65)"/>
          <!-- 马嘴（微张，生动） -->
          <path d="M26 68 Q24 72 27 75 Q31 77 33 73" fill="#7a5030"/>
          <path d="M27 72 Q29 71 31 73" stroke="#5a3a20" stroke-width="0.6" fill="none"/>
          <!-- 马眼 -->
          <ellipse cx="37" cy="63" rx="2.8" ry="3.2" fill="#1a1a1a"/>
          <circle cx="36.3" cy="62" r="0.9" fill="white"/>
          <!-- 马耳朵 -->
          <path d="M36 55 Q33 48 38 51 Q40 54 38 57Z" fill="#8B5E3C"/>
          <path d="M42 54 Q40 47 45 50 Q46 53 44 56Z" fill="#8B5E3C"/>
          <!-- 马鬃毛 -->
          <path d="M44 57 Q48 63 52 72 Q48 68 42 62 Q40 58 44 57Z" fill="#2d1810"/>
          <path d="M42 55 Q46 60 50 68 Q46 64 40 59Z" fill="#3d2820" opacity="0.7"/>
          <!-- 马腿 -->
          <line x1="60" y1="122" x2="57" y2="140" stroke="#6B4226" stroke-width="5.5" stroke-linecap="round"/>
          <line x1="72" y1="123" x2="69" y2="141" stroke="#6B4226" stroke-width="5.5" stroke-linecap="round"/>
          <line x1="92" y1="123" x2="95" y2="141" stroke="#7a5030" stroke-width="5.5" stroke-linecap="round"/>
          <line x1="104" y1="122" x2="107" y2="140" stroke="#7a5030" stroke-width="5.5" stroke-linecap="round"/>
          <!-- 马蹄 -->
          <ellipse cx="57" cy="141" rx="4" ry="2.2" fill="#1a1a1a"/>
          <ellipse cx="69" cy="142" rx="4" ry="2.2" fill="#1a1a1a"/>
          <ellipse cx="95" cy="142" rx="4" ry="2.2" fill="#1a1a1a"/>
          <ellipse cx="107" cy="141" rx="4" ry="2.2" fill="#1a1a1a"/>
          <!-- 马尾 -->
          <path d="M114 100 Q125 105 128 114 Q124 118 120 113 Q123 107 114 102Z" fill="#2d1810"/>
          <path d="M114 103 Q122 109 125 118 Q121 120 118 115 Q121 110 114 105Z" fill="#3d2820" opacity="0.7"/>
          <!-- 马鞍 -->
          <path d="M64 94 Q76 88 94 90 Q98 94 96 100 Q84 104 68 102 Q62 99 64 94Z" fill="#3d2820"/>
          <path d="M66 96 Q78 91 92 92 Q95 95 94 99 Q82 102 70 100 Q65 98 66 96Z" fill="#4a3428"/>
          <!-- 马鞍边饰 -->
          <path d="M66 100 Q78 103 94 100" stroke="#c0392b" stroke-width="1.2" fill="none" opacity="0.6"/>
          <!-- 缰绳 -->
          <path d="M33 73 Q42 82 58 90 Q64 92 68 94" stroke="#2d1810" stroke-width="1.3" fill="none"/>

          <!-- === Kelly 骑马 === -->
          <!-- 身体/紫色外套 -->
          <path d="M68 66 Q66 74 64 86 Q62 94 66 96 Q74 98 78 96 Q82 90 80 78 Q78 68 76 64Z" fill="url(#jacketGrad)"/>
          <!-- 外套拉链线 -->
          <line x1="72" y1="68" x2="72" y2="90" stroke="#9b7ab0" stroke-width="0.7" opacity="0.5"/>
          <!-- 外套领口 -->
          <path d="M66 66 Q72 64 78 66" stroke="#b088c8" stroke-width="1" fill="none"/>
          <!-- 黑色裤子/腿 -->
          <path d="M64 94 Q62 102 59 108 Q62 109 65 107 Q66 100 68 96Z" fill="#1a1a2e"/>
          <path d="M78 94 Q80 100 82 106 Q84 107 86 105 Q82 98 80 94Z" fill="#1a1a2e"/>
          <!-- 鞋子 -->
          <ellipse cx="59" cy="109" rx="3.5" ry="1.8" fill="#1a1a1a"/>
          <ellipse cx="85" cy="106" rx="3.5" ry="1.8" fill="#1a1a1a"/>

          <!-- 手臂（握缰绳） -->
          <path d="M66 72 Q60 80 55 86 Q53 88 55 89" stroke="#fce4d6" stroke-width="3.5" fill="none" stroke-linecap="round"/>
          <path d="M78 72 Q82 78 85 83" stroke="#fce4d6" stroke-width="3.5" fill="none" stroke-linecap="round"/>
          <!-- 手 -->
          <circle cx="55" cy="89" r="2.8" fill="#fce4d6"/>
          <circle cx="85" cy="83" r="2.8" fill="#fce4d6"/>

          <!-- === Kelly的头 === -->
          <!-- 脸（稍大一点更卡通可爱） -->
          <ellipse cx="72" cy="52" rx="14" ry="16" fill="#fce4d6"/>
          <!-- 头发（黑色长发，飘逸） -->
          <path d="M58 46 Q58 32 72 28 Q86 32 86 46 L86 42 Q86 26 72 22 Q58 26 58 42Z" fill="url(#hairGrad)"/>
          <!-- 刘海 -->
          <path d="M60 40 Q64 36 66 40 Q68 36 72 38 Q74 35 77 38 Q79 35 84 40" stroke="url(#hairGrad)" stroke-width="4.5" fill="url(#hairGrad)" stroke-linecap="round"/>
          <!-- 左侧长发垂下 -->
          <path d="M58 44 Q52 56 50 76 Q48 82 52 80 Q54 74 56 60 Q57 50 58 46Z" fill="url(#hairGrad)"/>
          <!-- 右侧长发飘动（骑马风吹效果） -->
          <path d="M86 44 Q92 52 100 62 Q106 68 104 66 Q98 60 90 50 Q87 46 86 44Z" fill="url(#hairGrad)"/>
          <path d="M85 46 Q90 54 98 64 Q102 70 100 68 Q95 62 88 52Z" fill="#2d2d44" opacity="0.5"/>
          <path d="M84 48 Q88 54 94 62 Q97 66 95 65 Q90 60 86 52Z" fill="#1a1a2e" opacity="0.4"/>

          <!-- 眉毛 -->
          <path d="M64 47 Q67 45 70 47" stroke="#2d2d44" stroke-width="1.3" fill="none" stroke-linecap="round"/>
          <path d="M74 47 Q77 45 80 47" stroke="#2d2d44" stroke-width="1.3" fill="none" stroke-linecap="round"/>
          <!-- 眼睛（大眼睛，可爱卡通风） -->
          <ellipse cx="67" cy="51" rx="4.2" ry="4.8" fill="white"/>
          <ellipse cx="68" cy="51.5" rx="2.6" ry="3" fill="#2c1810"/>
          <circle cx="69" cy="50.3" r="1.2" fill="white"/>
          <ellipse cx="77" cy="51" rx="4.2" ry="4.8" fill="white"/>
          <ellipse cx="78" cy="51.5" rx="2.6" ry="3" fill="#2c1810"/>

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
  const submitBtn = document.getElementById('submitBtn');
  submitBtn.className = 'submit-btn';
  switch(mode) {
    case 'kelly':
      submitBtn.classList.add('kelly-mode');
      submitBtn.innerHTML = '🫘 让枸杞来决定';
      break;
    case 'yangtong':
      submitBtn.classList.add('yangtong-mode');
      submitBtn.innerHTML = '💬 沟通给建议';
      break;
    case 'fusion':
      submitBtn.classList.add('fusion-mode');
      submitBtn.innerHTML = '💪 大力出琪迹';
      break;
  }
}

function quickFill(text) {
  document.getElementById('questionInput').value = text;
  document.getElementById('questionInput').focus();
}

async function generateAdvice() {
  const question = document.getElementById('questionInput').value.trim();
  if (!question) {
    document.getElementById('questionInput').placeholder = '先告诉我你在纠结什么呀 👆';
    document.getElementById('questionInput').focus();
    return;
  }

  const submitBtn = document.getElementById('submitBtn');
  const loading = document.getElementById('loading');
  const loadingText = document.getElementById('loadingText');
  const resultArea = document.getElementById('resultArea');
  const easterEgg = document.getElementById('easterEgg');
  const errorArea = document.getElementById('errorArea');

  submitBtn.disabled = true;
  resultArea.classList.remove('show');
  resultArea.innerHTML = '';
  easterEgg.classList.remove('show');
  errorArea.innerHTML = '';
  loading.classList.add('show');

  const loadingMessages = {
    kelly: ['枸杞正在分析局势...', '正在调用ENTP超级直觉...', 'AI方案生成中...'],
    yangtong: ['正在组织语言...', '真诚思考中...', 'AI沟通建议即将发射...'],
    fusion: ['大力琪正在蓄力...', '琪迹即将发生...', '💪 大力出琪迹中...']
  };
  let msgIndex = 0;
  const msgs = loadingMessages[currentMode];
  loadingText.textContent = msgs[0];
  const loadingInterval = setInterval(() => {
    msgIndex = (msgIndex + 1) % msgs.length;
    loadingText.textContent = msgs[msgIndex];
  }, 1200);

  // 星言彩蛋
  const q = question.toLowerCase();
  const isCatQuestion = q.includes('猫') || q.includes('星言') || q.includes('喵') || q.includes('瞪');

  try {
    // 调用智谱 GLM-4.7-Flash (完全免费)
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model: MODEL_NAME,
        messages: [
          { role: 'system', content: SYSTEM_PROMPTS[currentMode] },
          { role: 'user', content: `用户的纠结问题是：「${question}」\n\n请根据你的人设给出建议。` }
        ],
        temperature: 0.8,
        max_tokens: 1000
      })
    });

    if (!resp.ok) {
      const errData = await resp.json().catch(() => ({}));
      throw new Error(errData.error?.message || `API返回 ${resp.status}`);
    }

    const data = await resp.json();
    const aiText = data.choices?.[0]?.message?.content || '';

    clearInterval(loadingInterval);
    loading.classList.remove('show');
    submitBtn.disabled = false;

    if (!aiText) throw new Error('AI返回了空内容');

    if (isCatQuestion) {
      easterEgg.classList.add('show');
    }

    const now = new Date();
    const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    let html = '';

    if (currentMode === 'fusion') {
      html = buildFusionAICard(aiText, timeStr, question);
    } else {
      const type = currentMode === 'kelly' ? 'kelly' : 'yangtong';
      const name = currentMode === 'kelly' ? '枸杞' : '沟通';
      const tag = currentMode === 'kelly' ? 'ENTP · 果断派' : 'ENFJ · 真诚派';
      const emoji = currentMode === 'kelly' ? '🫘' : '💬';
      html = buildAICard(type, name, tag, emoji, aiText, timeStr, question);
    }

    resultArea.innerHTML = html;
    resultArea.classList.add('show');

    historyList.unshift({ question, mode: currentMode, time: timeStr });
    if (historyList.length > 5) historyList.pop();
    renderHistory();

    resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    clearInterval(loadingInterval);
    loading.classList.remove('show');
    submitBtn.disabled = false;
    console.error('AI Error:', err);
    errorArea.innerHTML = `<div class="error-msg">AI 暂时开小差了，请稍后再试 🙈<br><small>${err.message || ''}</small></div>`;
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function buildAICard(type, name, tag, emoji, aiText, time, question) {
  const escaped = escapeHtml(aiText);
  const paragraphs = escaped.split('\n').filter(l => l.trim()).map(l => {
    if (l.startsWith('结论：') || l.startsWith('結論：')) {
      return `<p class="highlight" style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border-subtle);">🔥 ${l}</p>`;
    }
    return `<p>${l}</p>`;
  }).join('');

  return `
    <div class="result-card">
      <div class="result-header">
        <div class="result-avatar ${type}">${emoji}</div>
        <div class="result-name">${name}</div>
        <span class="result-tag ${type}">${tag}</span>
      </div>
      <div class="result-body">
        <p style="color:var(--text-muted);font-size:12px;margin-bottom:16px;">关于「${escapeHtml(question)}」</p>
        ${paragraphs}
      </div>
      <div class="result-footer">
        <span class="timestamp">${time} · ${name}</span>
        <button class="retry-btn" onclick="generateAdvice()">🔄 换个思路</button>
      </div>
    </div>
  `;
}

function buildFusionAICard(aiText, time, question) {
  const escaped = escapeHtml(aiText);

  const kellyMatch = escaped.match(/【凱琪(?:说|說)】\s*([\s\S]*?)(?=【杨童|【楊童)/);
  const yangtongMatch = escaped.match(/【(?:杨童|楊童)(?:说|說)】\s*([\s\S]*?)(?=【大力出琪迹)/);
  const fusionMatch = escaped.match(/【大力出琪迹】\s*([\s\S]*?)$/);

  if (kellyMatch && yangtongMatch && fusionMatch) {
    return `

        <div class="result-header">
          <div class="result-avatar kelly">🫘</div>
          <div class="result-name">枸杞</div>
          <span class="result-tag kelly">ENTP</span>
        </div>
        <div class="result-body">
          <p style="color:var(--text-muted);font-size:12px;margin-bottom:12px;">关于「${escapeHtml(question)}」</p>
          <p>${kellyMatch[1].trim()}</p>
        </div>
      </div>
      <div class="result-card">
        <div class="result-header">
          <div class="result-avatar yangtong">💬</div>
          <div class="result-name">沟通</div>
          <span class="result-tag yangtong">ENFJ</span>
        </div>
        <div class="result-body">
          <p>${yangtongMatch[1].trim()}</p>
        </div>
      </div>
      <div class="result-card" style="border-color:rgba(249,115,22,0.2);">
        <div class="result-header">
          <div class="result-avatar fusion">💪</div>
          <div class="result-name">大力出琪迹</div>
          <span class="result-tag fusion">FINAL</span>
        </div>
        <div class="result-body">
          <p class="highlight">${fusionMatch[1].trim()}</p>
        </div>
        <div class="result-footer">
          <span class="timestamp">${time} · 大力出琪迹</span>
          <button class="retry-btn" onclick="generateAdvice()">🔄 换个思路</button>
        </div>
      </div>
    `;
  }

  const paragraphs = escaped.split('\n').filter(l => l.trim()).map(l => `<p>${l}</p>`).join('');
  return `
    <div class="result-card" style="border-color:rgba(249,115,22,0.2);">
      <div class="result-header">
        <div class="result-avatar fusion">💪</div>
        <div class="result-name">大力出琪迹</div>
        <span class="result-tag fusion">FINAL</span>
      </div>
      <div class="result-body">
        <p style="color:var(--text-muted);font-size:12px;margin-bottom:12px;">关于「${escapeHtml(question)}」</p>
        ${paragraphs}
      </div>
      <div class="result-footer">
        <span class="timestamp">${time} · 大力出琪迹</span>
        <button class="retry-btn" onclick="generateAdvice()">🔄 换个思路</button>
      </div>
    </div>
  `;
}

function renderHistory() {
  if (historyList.length === 0) return;
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  section.style.display = 'block';
  const modeLabels = { kelly: '🫘 枸杞', yangtong: '💬 沟通', fusion: '💪 大力出琪迹' };
  list.innerHTML = historyList.map(h => `
    <div class="history-item" onclick="quickFill('${h.question.replace(/'/g, "\\'")}')">
      <div class="h-question">${escapeHtml(h.question)}</div>
      <div class="h-meta">${h.time} · ${modeLabels[h.mode]}</div>
    </div>
  `).join('');
}

document.getElementById('questionInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    generateAdvice();
  }
});

document.getElementById('questionInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 200) + 'px';
});
</script>
